<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" font-family="'Trebuchet MS','Segoe UI',sans-serif">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#8fd3ff"/><stop offset="0.5" stop-color="#bfe9d0"/><stop offset="1" stop-color="#dff3bd"/>
  </linearGradient>
  <radialGradient id="sunG" cx="0.35" cy="0.3" r="0.75"><stop offset="0" stop-color="#fff7c8"/><stop offset="0.55" stop-color="#ffd84a"/><stop offset="1" stop-color="#f39c12"/></radialGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#84cf5f"/><stop offset="1" stop-color="#67ad49"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8fd968"/><stop offset="1" stop-color="#72b953"/></linearGradient>
  <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8ee86a"/><stop offset="1" stop-color="#3f9e34"/></linearGradient>
  <linearGradient id="hudG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1d3327"/><stop offset="1" stop-color="#0d1c14"/></linearGradient>
  <linearGradient id="btnG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7ef7a6"/><stop offset="1" stop-color="#34c06a"/></linearGradient>
  <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6d4a2b"/><stop offset="1" stop-color="#4e3319"/></linearGradient>
  <linearGradient id="sci" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#123036"/><stop offset="1" stop-color="#0a1a1e"/></linearGradient>
  <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75"><stop offset="0.6" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.28"/></radialGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#123" flood-opacity="0.35"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

  <!-- ===== SYMBOLS (wie 'PNG-Sprites') ===== -->
  <g id="sunflower">
    <ellipse cx="0" cy="46" rx="26" ry="9" fill="#000" opacity="0.15"/>
    <rect x="-7" y="8" width="14" height="40" rx="6" fill="url(#leaf)"/>
    <path d="M-6 30 Q-34 22 -40 40 Q-18 44 -6 34Z" fill="url(#leaf)"/>
    <g>
      <g id="pet"><ellipse cx="0" cy="-30" rx="9" ry="18" fill="#ffd84a" stroke="#e8a81f" stroke-width="2"/></g>
      <use href="#pet" transform="rotate(40)"/><use href="#pet" transform="rotate(80)"/><use href="#pet" transform="rotate(120)"/>
      <use href="#pet" transform="rotate(160)"/><use href="#pet" transform="rotate(200)"/><use href="#pet" transform="rotate(240)"/>
      <use href="#pet" transform="rotate(280)"/><use href="#pet" transform="rotate(320)"/>
    </g>
    <circle cx="0" cy="0" r="21" fill="#8a5a1a"/><circle cx="0" cy="0" r="21" fill="url(#sunG)" opacity="0.35"/>
    <circle cx="-8" cy="-4" r="4.5" fill="#fff"/><circle cx="8" cy="-4" r="4.5" fill="#fff"/>
    <circle cx="-7" cy="-3" r="2.4" fill="#241708"/><circle cx="9" cy="-3" r="2.4" fill="#241708"/>
    <path d="M-8 9 Q0 16 8 9" stroke="#241708" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <g id="peashooter">
    <ellipse cx="0" cy="48" rx="24" ry="8" fill="#000" opacity="0.15"/>
    <rect x="-9" y="6" width="18" height="44" rx="9" fill="url(#leaf)"/>
    <path d="M-8 34 Q-32 30 -36 46 Q-16 46 -8 38Z" fill="#4fae3e"/>
    <ellipse cx="4" cy="-4" rx="24" ry="20" fill="url(#leaf)"/>
    <circle cx="26" cy="-4" r="11" fill="#3f9e34"/><circle cx="34" cy="-4" r="6" fill="#2b6e22"/>
    <circle cx="-2" cy="-9" r="4" fill="#fff"/><circle cx="-1" cy="-8" r="2" fill="#173"/>
  </g>

  <g id="wallnut">
    <ellipse cx="0" cy="42" rx="26" ry="8" fill="#000" opacity="0.15"/>
    <ellipse cx="0" cy="4" rx="30" ry="38" fill="#9a6535" stroke="#6e451f" stroke-width="3"/>
    <ellipse cx="-6" cy="-6" rx="16" ry="18" fill="#b57e46" opacity="0.7"/>
    <circle cx="-10" cy="2" r="4.5" fill="#fff"/><circle cx="10" cy="2" r="4.5" fill="#fff"/>
    <circle cx="-9" cy="3" r="2.4" fill="#2a1a0e"/><circle cx="11" cy="3" r="2.4" fill="#2a1a0e"/>
    <path d="M-10 18 Q0 24 10 18" stroke="#2a1a0e" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <g id="zombie">
    <ellipse cx="0" cy="56" rx="20" ry="7" fill="#000" opacity="0.18"/>
    <rect x="-15" y="2" width="30" height="46" rx="9" fill="#5f7a6b"/>
    <rect x="-15" y="24" width="30" height="10" fill="#4d6559"/>
    <rect x="-19" y="10" width="9" height="26" rx="4" fill="#88958c"/>
    <rect x="14" y="4" width="9" height="24" rx="4" fill="#88958c"/>
    <circle cx="0" cy="-16" r="17" fill="#9db08c"/>
    <path d="M-17 -16 a17 17 0 0 1 34 0" fill="#8aa07a"/>
    <circle cx="-6" cy="-18" r="3" fill="#1a1a1a"/><circle cx="6" cy="-18" r="3" fill="#c0392b"/>
    <path d="M-7 -6 h14" stroke="#3a2a20" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g id="conezombie">
    <use href="#zombie"/>
    <path d="M-13 -30 L0 -60 L13 -30 Z" fill="#e08b3a" stroke="#a5641f" stroke-width="3"/>
    <path d="M-8 -40 h16 M-11 -33 h22" stroke="#a5641f" stroke-width="2"/>
  </g>

  <g id="mower">
    <ellipse cx="18" cy="30" rx="24" ry="6" fill="#000" opacity="0.2"/>
    <rect x="0" y="2" width="40" height="22" rx="6" fill="#d84a3a" stroke="#9c2f22" stroke-width="2"/>
    <rect x="6" y="-6" width="14" height="12" rx="3" fill="#b23a2c"/>
    <circle cx="10" cy="26" r="9" fill="#333"/><circle cx="10" cy="26" r="4" fill="#777"/>
    <circle cx="32" cy="26" r="9" fill="#333"/><circle cx="32" cy="26" r="4" fill="#777"/>
  </g>
</defs>

<!-- ===================== MAIN SCENE (Tag) ===================== -->
<rect width="1280" height="860" fill="#0a120c"/>
<rect x="0" y="58" width="1280" height="560" fill="url(#sky)"/>
