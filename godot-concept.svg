    <rect width="340" height="60" rx="30" fill="none" stroke="#2a7d47" stroke-width="0"/>
    <text x="170" y="39" text-anchor="middle" fill="#062012" font-size="22" font-weight="bold" letter-spacing="1">🌊 Welle 6 starten</text>
