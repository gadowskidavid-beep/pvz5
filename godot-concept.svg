  <text x="24" y="37" fill="#5ee88a" font-size="22" letter-spacing="3" font-weight="bold">🧬 BOTANIK-LABOR</text>
  <g font-size="18" font-weight="bold">
    <rect x="330" y="14" width="112" height="30" rx="15" fill="#00000055" stroke="#ffd54f" stroke-width="2"/><text x="346" y="35" fill="#ffd54f">☀ 320</text>
    <rect x="452" y="14" width="112" height="30" rx="15" fill="#00000055" stroke="#5ee8e8" stroke-width="2"/><text x="468" y="35" fill="#5ee8e8">🧬 47</text>
    <rect x="574" y="14" width="112" height="30" rx="15" fill="#00000055" stroke="#ffcf4d" stroke-width="2"/><text x="590" y="35" fill="#ffcf4d">🪙 62</text>
    <rect x="696" y="14" width="112" height="30" rx="15" fill="#00000055" stroke="#e0aaff" stroke-width="2"/><text x="712" y="35" fill="#e0aaff">🧠 9</text>
  </g>
  <g font-size="13" fill="#eaf2e6">
    <rect x="946" y="15" width="96" height="28" rx="10" fill="#13241a" stroke="#5ee8e8" stroke-width="1.5"/><text x="958" y="33" fill="#5ee8e8">🔬 Forschung</text>
    <rect x="1050" y="15" width="86" height="28" rx="10" fill="#13241a" stroke="#23402c" stroke-width="1.5"/><text x="1062" y="33">🪙 Laden</text>
    <rect x="1144" y="15" width="118" height="28" rx="10" fill="#13241a" stroke="#e0aaff" stroke-width="1.5"/><text x="1156" y="33" fill="#e0aaff">🧠 Wiedergeburt</text>
