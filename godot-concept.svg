    <g transform="translate(18,240)"><rect width="92" height="66" rx="12" fill="#13241a" stroke="#23402c" stroke-width="2"/>
      <ellipse cx="30" cy="32" rx="16" ry="18" fill="#8a5a34"/><ellipse cx="30" cy="26" rx="10" ry="7" fill="#a06c40"/><text x="56" y="26" fill="#eaf2e6" font-size="11">Wand</text><text x="56" y="46" fill="#ffd54f" font-size="12" font-weight="bold">☀50</text></g>
    <g transform="translate(18,314)" opacity="0.4"><rect width="92" height="66" rx="12" fill="#13241a" stroke="#23402c" stroke-width="2"/>
      <ellipse cx="30" cy="30" rx="16" ry="13" fill="#7bbf4a"/><text x="52" y="26" fill="#eaf2e6" font-size="11">Werfer</text><text x="52" y="46" fill="#7a8f7c" font-size="12">🔒 🧬40</text></g>
