<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Trebuchet MS, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe9ff"/><stop offset="0.55" stop-color="#e9f6d8"/><stop offset="1" stop-color="#d6efb8"/>
    </linearGradient>
    <linearGradient id="hud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2f22"/><stop offset="1" stop-color="#0e1c14"/>
    </linearGradient>
    <linearGradient id="grassA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7cc35a"/><stop offset="1" stop-color="#6bb14c"/></linearGradient>
    <linearGradient id="grassB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#84cf60"/><stop offset="1" stop-color="#74bd52"/></linearGradient>
    <radialGradient id="sun" cx="0.35" cy="0.3" r="0.8"><stop offset="0" stop-color="#fff6c2"/><stop offset="0.6" stop-color="#ffd54f"/><stop offset="1" stop-color="#f6a723"/></radialGradient>
    <linearGradient id="pod" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8fe36a"/><stop offset="1" stop-color="#4fae3e"/></linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6cf29a"/><stop offset="1" stop-color="#37bd66"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f2226"/><stop offset="1" stop-color="#0b171a"/></linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>

  <!-- BG -->
