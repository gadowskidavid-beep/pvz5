      <circle cx="30" cy="28" r="15" fill="url(#sun)"/><g fill="#f6a723"><circle cx="30" cy="10" r="4"/><circle cx="46" cy="20" r="4"/><circle cx="46" cy="38" r="4"/><circle cx="30" cy="47" r="4"/><circle cx="14" cy="38" r="4"/><circle cx="14" cy="20" r="4"/></g>
      <text x="58" y="26" fill="#eaf2e6" font-size="11">Sonne</text><text x="58" y="46" fill="#ffd54f" font-size="12" font-weight="bold">☀50</text></g>
