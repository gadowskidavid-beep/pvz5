      <g transform="translate(12,170)"><rect width="126" height="42" rx="9" fill="#0e2226" stroke="#2a5a5a"/><text x="10" y="18" fill="#bff">💨 Feuerrate L2</text><rect x="80" y="24" width="40" height="14" rx="7" fill="#5ee8e8"/><text x="100" y="35" text-anchor="middle" fill="#052424" font-size="10" font-weight="bold">🧬8</text></g>
      <g transform="translate(12,220)"><rect width="126" height="42" rx="9" fill="#0e2226" stroke="#2a5a5a"/><text x="10" y="18" fill="#bff">👆 Klick Lv1</text><rect x="80" y="24" width="40" height="14" rx="7" fill="#5ee8e8"/><text x="100" y="35" text-anchor="middle" fill="#052424" font-size="10" font-weight="bold">🧬5</text></g>
      <g transform="translate(12,270)"><rect width="126" height="42" rx="9" fill="#0e2226" stroke="#2a5a5a"/><text x="10" y="18" fill="#bff">☀ Sonne Lv0</text><rect x="80" y="24" width="40" height="14" rx="7" fill="#5ee8e8"/><text x="100" y="35" text-anchor="middle" fill="#052424" font-size="10" font-weight="bold">🧬8</text></g>
    </g>
    <text x="75" y="340" text-anchor="middle" fill="#7fb8b8" font-size="9">🌱 Chassis · 🛠 Ausrüstung</text>
    <g transform="translate(28,354)"><rect width="42" height="42" rx="9" fill="#13241a" stroke="#5ee88a"/><text x="21" y="30" text-anchor="middle" font-size="20">🫛</text></g>
    <g transform="translate(80,354)"><rect width="42" height="42" rx="9" fill="#13241a" stroke="#23402c"/><text x="21" y="30" text-anchor="middle" font-size="20">🥬</text></g>
